name: API Canary

# Live-hits the external APIs LinerNotes actually depends on (web + mobile) and
# fails loudly if any changed shape / went down. This is the layer the weekly
# cloud Health Audit CANNOT do (its sandbox blocks outbound network).
#
# Coverage comes from the audit's integration map:
#   web    → iTunes, MusicBrainz, Cover Art Archive, Spotify (client-creds)
#   mobile → Odesli/song.link, Last.fm
# We also hit our DEPLOYED endpoints so the check exercises the real chain
# mobile depends on (it calls beta-linernotes.vercel.app/api) AND the prod
# secrets, without copying them into GitHub.
# (LRCLIB / ListenBrainz / Audius are researched but NOT yet in the codebase —
#  add them here when they ship.)
on:
  schedule:
    - cron: "0 7 * * *" # daily 07:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "apps/web/app/api/**"
      - "apps/mobile/src/services/**"
      - ".github/workflows/api-canary.yml"

jobs:
  canary:
    runs-on: ubuntu-latest
    env:
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }} # optional; skipped if unset
      WEB: https://beta-linernotes.vercel.app
    steps:
      - name: Run canaries
        shell: bash
        run: |
          set -uo pipefail
          fail=0
          UA="LinerNotes-canary/1.0 (github actions; https://github.com/yourlinernotes/LinerNotes)"

          # json_check <name> <url> <python-bool-expr over `d`>
          json_check() {
            local name="$1" url="$2" expr="$3" body
            body=$(curl -fsS --max-time 25 -H "User-Agent: $UA" -H "Accept: application/json" "$url" 2>/dev/null) \
              || { echo "::error::🔴 $name — request failed (down / network / non-2xx)"; fail=1; return; }
            if printf '%s' "$body" | python3 -c "import sys,json
d=json.load(sys.stdin); sys.exit(0 if ($expr) else 1)" 2>/dev/null; then
              echo "🟢 $name — OK"
            else
              echo "::error::🔴 $name — response shape changed (expected: $expr)"; fail=1
            fi
          }

          # code_check <name> <url> <ok-codes-regex>  (reachability only)
          code_check() {
            local name="$1" url="$2" ok="$3" code
            code=$(curl -s -o /dev/null --max-time 25 -H "User-Agent: $UA" -w "%{http_code}" "$url")
            if [[ "$code" =~ $ok ]]; then echo "🟢 $name — OK (HTTP $code)"; else echo "::error::🔴 $name — HTTP $code"; fail=1; fi
          }

          echo "── External APIs (web) ──"
          json_check "iTunes Search" \
            "https://itunes.apple.com/search?term=joji&entity=song&limit=1" \
            "d.get('results') and d['results'][0].get('previewUrl')"
          json_check "MusicBrainz" \
            "https://musicbrainz.org/ws/2/recording/?query=artist:Joji%20AND%20recording:Glimpse%20of%20Us&fmt=json&limit=1" \
            "d.get('recordings') is not None"
          code_check "Cover Art Archive" \
            "https://coverartarchive.org/release/76df3287-6cda-33eb-8e9a-044b5e15ffdd" \
            "^(200|307|404)$"

          echo "── External APIs (mobile) ──"
          json_check "Odesli / song.link" \
            "https://api.song.link/v1-alpha.1/links?url=https%3A%2F%2Fopen.spotify.com%2Ftrack%2F3aBGKDiAAvH2H7HLOyQ4US&userCountry=US" \
            "isinstance(d.get('linksByPlatform'), dict)"

          echo "── Deployed chain (mobile calls these; also exercises prod secrets) ──"
          json_check "web /api/music/search/tracks" \
            "$WEB/api/music/search/tracks?q=joji&limit=1" \
            "d.get('results') is not None"
          json_check "web /api/spotify-link (Spotify client-creds)" \
            "$WEB/api/spotify-link?id=1776741889&kind=track&title=Glimpse%20of%20Us&artist=Joji" \
            "'url' in d"

          echo "── Secret-gated (optional) ──"
          if [ -n "${LASTFM_API_KEY:-}" ]; then
            json_check "Last.fm" \
              "https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=Joji&track=Glimpse%20of%20Us&format=json" \
              "d.get('track',{}).get('name')"
          else
            echo "⚪ Last.fm — SKIPPED (no LASTFM_API_KEY secret; the deployed now-playing/prompts routes also exercise it once a user is connected)"
          fi

          echo "───────────────"
          if [ "$fail" -ne 0 ]; then echo "::error::One or more API canaries FAILED — an integration likely broke."; exit 1; fi
          echo "✅ All canaries healthy."
