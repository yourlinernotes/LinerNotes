name: API Canary

# Live-hits the external APIs LinerNotes depends on and fails loudly if any
# changed shape / went down. This is the layer the weekly cloud Health Audit
# CANNOT do (its sandbox blocks outbound network). Runs daily + on every deploy.
on:
  schedule:
    - cron: "0 7 * * *" # daily 07:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "apps/web/app/api/**"
      - ".github/workflows/api-canary.yml"

jobs:
  canary:
    runs-on: ubuntu-latest
    env:
      # secret-gated canaries — add these in repo Settings → Secrets → Actions
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
    steps:
      - name: Run canaries
        shell: bash
        run: |
          set -uo pipefail
          fail=0
          UA="LinerNotes-canary/1.0 (github actions)"

          # check <name> <url> <python-expression-that-must-be-truthy>
          check() {
            local name="$1" url="$2" expr="$3"
            local body; body=$(curl -fsS --max-time 20 -H "User-Agent: $UA" "$url" 2>/dev/null) || {
              echo "::error::🔴 $name — request failed (down / network / non-2xx)"; fail=1; return; }
            if printf '%s' "$body" | python3 -c "import sys,json
d=json.load(sys.stdin)
sys.exit(0 if ($expr) else 1)" 2>/dev/null; then
              echo "🟢 $name — OK"
            else
              echo "::error::🔴 $name — response shape changed (expected: $expr)"; fail=1
            fi
          }

          echo "── Keyless canaries ──"
          check "LRCLIB"      "https://lrclib.net/api/get?artist_name=Joji&track_name=Glimpse%20of%20Us&duration=233" \
                "d.get('trackName') and 'syncedLyrics' in d"
          check "iTunes"      "https://itunes.apple.com/search?term=joji&entity=song&limit=1" \
                "d.get('results') and d['results'][0].get('previewUrl')"
          check "ListenBrainz" "https://api.listenbrainz.org/1/user/rob/listens?count=1" \
                "d.get('payload',{}).get('listens') is not None"
          check "Audius"      "https://api.audius.co" \
                "isinstance(d.get('data'), list) and len(d['data'])>0"

          echo "── Secret-gated canaries ──"
          # Spotify client-credentials search (powers Open-in-Spotify deeplinks)
          if [ -n "${SPOTIFY_CLIENT_ID:-}" ] && [ -n "${SPOTIFY_CLIENT_SECRET:-}" ]; then
            tok=$(curl -fsS --max-time 20 -X POST "https://accounts.spotify.com/api/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=client_credentials&client_id=${SPOTIFY_CLIENT_ID}&client_secret=${SPOTIFY_CLIENT_SECRET}" \
              | python3 -c "import sys,json;print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null)
            if [ -z "$tok" ]; then echo "::error::🔴 Spotify — client-credentials token failed (creds invalid or flow changed)"; fail=1
            else
              if curl -fsS --max-time 20 "https://api.spotify.com/v1/search?q=joji&type=track&limit=1" \
                   -H "Authorization: Bearer $tok" \
                   | python3 -c "import sys,json;d=json.load(sys.stdin);sys.exit(0 if d.get('tracks',{}).get('items') else 1)"; then
                echo "🟢 Spotify search — OK"
              else echo "::error::🔴 Spotify — search response changed"; fail=1; fi
            fi
          else echo "⚪ Spotify — SKIPPED (no SPOTIFY_CLIENT_ID/SECRET secret)"; fi

          # Last.fm
          if [ -n "${LASTFM_API_KEY:-}" ]; then
            check "Last.fm" "https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=Joji&track=Glimpse%20of%20Us&format=json" \
              "d.get('track',{}).get('name')"
          else echo "⚪ Last.fm — SKIPPED (no LASTFM_API_KEY secret)"; fi

          echo "───────────────"
          if [ "$fail" -ne 0 ]; then echo "::error::One or more API canaries FAILED — an integration likely broke."; exit 1; fi
          echo "✅ All canaries healthy."
